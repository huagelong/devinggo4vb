# CLI tool, only in development environment.
# https://goframe.org/pages/viewpage.action?pageId=3673173
gfcli:
  build:
    name: "devinggo"
    #    arch:     "386,amd64,arm"
    arch: "amd64"
    #    system:   "linux"
    system: "linux,windows"
    #    system:   "linux,darwin,windows"
    mod: "none"
    packSrc: "resource,manifest"                    # 将resource目录打包进可执行文件，静态资源无需单独部署
    packDst: "internal/packed/packed.go"   # 打包后生成的Go文件路径，一般使用相对路径指定到本项目目录中
    path: "./bin"
    extra: " -ldflags \"-s -w\" "
    version: v1.0.0
    cgo: 0
  docker:
    build: "-a amd64 -s linux -p temp -ew"
    tagPrefixes:
      - ccr.ccs.tencentyun.com/devinghub
  gen:
    dao:
      - tablesEx: "system_migrations"
        link: "pgsql:host=127.0.0.1 port=5432 dbname=devinggo user=postgres password=123456 sslmode=disable TimeZone=Asia/Shanghai"
        jsonCase: "CamelLower"
        descriptionTag:  true
        noModelComment:  false
        gJsonSupport: true
        overwriteDao: true
        clear: true
